<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; worker-src 'self'; media-src 'self' blob:; style-src 'self' 'unsafe-inline'">
  <title>ARIA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --text: #e0e0e0;
      --text-muted: #8888aa;
      --accent: #0f3460;
      --accent-active: #e94560;
      --success: #2ecc71;
      --warning: #f39c12;
      --error: #e74c3c;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      -webkit-app-region: drag;
    }

    header h1 { font-size: 18px; font-weight: 600; }

    .status-bar {
      display: flex;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot.active { background: var(--success); }
    .status-dot.error { background: var(--error); }
    .status-dot.loading { background: var(--warning); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      overflow-y: auto;
    }

    #conversation {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      padding-bottom: 20px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .message.user {
      align-self: flex-end;
      background: var(--accent);
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--surface);
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    #text-input {
      flex: 1;
      padding: 10px 16px;
      background: var(--bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    #text-input:focus { border-color: var(--accent-active); }

    #mic-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    #mic-btn:hover { background: var(--accent-active); }
    #mic-btn.listening { background: var(--accent-active); animation: pulse 1s infinite; }

    .partial-text {
      font-style: italic;
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 13px;
    }

    .error-banner {
      padding: 10px 16px;
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid var(--error);
      border-radius: 8px;
      color: var(--error);
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .error-banner.visible { display: block; }

    #settings-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      border-radius: 6px;
    }
    #settings-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .settings-overlay.visible { display: flex; }

    .settings-panel {
      background: var(--surface);
      width: 90%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      border-radius: 12px;
      padding: 0 24px 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surface);
      padding: 20px 0 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 16px;
    }
    .settings-header h2 { font-size: 18px; }
    #settings-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 28px; cursor: pointer; line-height: 1;
    }
    #settings-close:hover { color: var(--text); }

    .settings-panel section { margin-bottom: 20px; }
    .settings-panel h3 {
      font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-muted); margin-bottom: 10px;
    }
    .settings-panel label {
      display: block; font-size: 13px; margin-bottom: 12px; color: var(--text);
    }
    .settings-panel label .hint { color: var(--text-muted); font-size: 11px; }
    .settings-panel input[type="url"],
    .settings-panel input[type="text"],
    .settings-panel input[type="password"],
    .settings-panel select {
      width: 100%; margin-top: 4px; padding: 8px 12px;
      background: var(--bg); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: var(--text); font-size: 14px; outline: none;
    }
    .settings-panel input:focus, .settings-panel select:focus {
      border-color: var(--accent-active);
    }
    .checkbox-label { display: flex !important; align-items: center; gap: 8px; }
    .checkbox-label input { width: auto !important; margin: 0 !important; }

    .settings-warning {
      display: none; padding: 10px 14px; margin-bottom: 16px;
      background: rgba(243, 156, 18, 0.15); border: 1px solid var(--warning);
      border-radius: 8px; color: var(--warning); font-size: 12px;
    }
    .settings-warning.visible { display: block; }

    .settings-footer { display: flex; align-items: center; gap: 12px; }
    button.primary {
      background: var(--accent-active); color: white; border: none;
      padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    button.primary:hover { opacity: 0.9; }
    #settings-saved-msg { color: var(--success); font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <h1>ARIA</h1>
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot" id="status-stt"></div>
        <span>STT</span>
      </div>
      <div class="status-item">
        <div class="status-dot" id="status-tts"></div>
        <span>TTS</span>
      </div>
      <div class="status-item">
        <div class="status-dot" id="status-wakeword"></div>
        <span>Wake</span>
      </div>
      <button id="settings-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="settings-close" title="Close">&times;</button>
      </div>

      <div class="settings-warning" id="secure-warning"></div>

      <section>
        <h3>Language Model (remote)</h3>
        <label>Endpoint URL
          <input type="url" id="cfg-llm-endpoint" placeholder="https://api.example.com/v1/chat/completions">
        </label>
        <label>Model
          <input type="text" id="cfg-llm-model" placeholder="gpt-4o-mini">
        </label>
        <label>API Key <span class="hint">(stored in OS keyring via safeStorage)</span>
          <input type="password" id="cfg-llm-key" placeholder="sk-... (leave blank to keep existing)">
        </label>
      </section>

      <section>
        <h3>Speech-to-Text</h3>
        <label>Model
          <select id="cfg-stt-model">
            <option value="base.en">base.en — fast (74M)</option>
            <option value="small">small — balanced (244M)</option>
            <option value="medium">medium — accurate (769M)</option>
          </select>
        </label>
        <label>Backend
          <select id="cfg-stt-backend">
            <option value="vulkan">Vulkan (GPU)</option>
            <option value="cpu">CPU</option>
          </select>
        </label>
      </section>

      <section>
        <h3>Text-to-Speech</h3>
        <label>Voice
          <input type="text" id="cfg-tts-voice" placeholder="en_US-lessac-medium">
        </label>
      </section>

      <section>
        <h3>Wake Word</h3>
        <label class="checkbox-label">
          <input type="checkbox" id="cfg-ww-enabled"> Enable always-on wake word
        </label>
        <label>Phrase
          <select id="cfg-ww-phrase">
            <option value="hey_jarvis">hey jarvis</option>
            <option value="hey_mycroft">hey mycroft</option>
            <option value="alexa">alexa</option>
          </select>
        </label>
      </section>

      <div class="settings-footer">
        <button id="settings-save" class="primary">Save</button>
        <span id="settings-saved-msg"></span>
      </div>
    </div>
  </div>

  <main>
    <div class="error-banner" id="error-banner"></div>
    <div id="conversation"></div>
    <div class="partial-text" id="partial"></div>
  </main>

  <div class="input-area">
    <input type="text" id="text-input" placeholder="Type a message or press the mic..." autocomplete="off">
    <button id="mic-btn" title="Hold to speak (or use global shortcut)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>

  <script src="audio-utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
