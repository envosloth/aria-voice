# Cross-platform release builds. Native pieces (PyInstaller-frozen Python
# sidecars and the compiled whisper.cpp binaries) cannot be cross-compiled, so
# each OS is built on its own runner. Push a tag like `v1.6.0` to produce a draft
# GitHub Release with Linux (.deb/.rpm/.AppImage), Windows (.exe), and macOS
# (.dmg) artifacts attached.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets are listed explicitly (not from electron-builder.yml) so
          # CI builds the Fedora/RHEL .rpm too, while a local `npm run dist` stays
          # deb+AppImage only (no rpmbuild needed on a dev box).
          - os: ubuntu-latest
            platform: linux
            ebargs: --linux AppImage deb rpm
          - os: windows-latest
            platform: win
            ebargs: --win
          - os: macos-latest
            platform: mac
            ebargs: --mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # electron-builder's rpm target shells out to rpmbuild, which ubuntu runners
      # don't ship. Without it the .rpm step fails the whole Linux build.
      - name: Install rpm tooling (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install JS deps
        run: npm ci

      - name: Compile TypeScript + renderer
        run: npm run build

      # Each sidecar is frozen from its OWN venv (scripts/package-sidecar.sh),
      # which a fresh runner doesn't have — this was the long-standing release
      # failure ("Missing venv"). Create each venv and install its pinned
      # requirements so the freeze step has the interpreter + deps it expects.
      - name: Set up sidecar venvs
        run: |
          for s in stt tts wakeword; do
            python -m venv "sidecars/$s/venv"
            # venv tool dir is bin/ on Linux/macOS, Scripts/ on Windows.
            BIN="sidecars/$s/venv/bin"; [ -d "sidecars/$s/venv/Scripts" ] && BIN="sidecars/$s/venv/Scripts"
            "$BIN/python" -m pip install --upgrade pip
            "$BIN/pip" install -r "sidecars/$s/requirements.txt"
          done

      # Freeze the three Python sidecars (STT, TTS/Kokoro, wake word) into
      # onedir bundles for THIS OS. PyInstaller runs natively per platform.
      - name: Freeze sidecars
        run: npm run package:sidecars

      # Build whisper.cpp for this OS (Vulkan where available, CPU fallback).
      # See scripts/build-whispercpp.sh; Windows uses the CMake + VS toolchain.
      - name: Build + stage whisper.cpp
        run: |
          bash scripts/build-whispercpp.sh || echo "::warning::whisper.cpp build failed on ${{ matrix.platform }} — STT may fall back to CPU/none"
          bash scripts/stage-whisper.sh || true

      - name: Package installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.ebargs }} --config electron-builder.yml --publish onTagOrDraft

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aria-${{ matrix.platform }}
          path: |
            dist-installers/*.deb
            dist-installers/*.rpm
            dist-installers/*.AppImage
            dist-installers/*.exe
            dist-installers/*.dmg
            dist-installers/*.zip
          if-no-files-found: ignore
