# Cross-platform release builds. Native pieces (PyInstaller-frozen Python
# sidecars and the compiled whisper.cpp binaries) cannot be cross-compiled, so
# each OS is built on its own runner. Push a tag like `v1.6.0` to produce a draft
# GitHub Release with Linux (.deb/.rpm/.AppImage), Windows (.exe), and macOS
# (.dmg) artifacts attached.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets are listed explicitly (not from electron-builder.yml) so
          # CI builds the Fedora/RHEL .rpm too, while a local `npm run dist` stays
          # deb+AppImage only (no rpmbuild needed on a dev box).
          - os: ubuntu-latest
            platform: linux
            target: --linux AppImage deb rpm
            artifact: linux
          - os: windows-latest
            platform: win
            target: --win
            artifact: win
          # Native sidecars and whisper.cpp cannot be shared between Apple
          # Silicon and Intel. Build each installer on its matching runner.
          - os: macos-15
            platform: mac
            target: --mac --arm64
            artifact: mac-arm64
          - os: macos-15-intel
            platform: mac
            target: --mac --x64
            artifact: mac-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # electron-builder's rpm target shells out to rpmbuild, which ubuntu runners
      # don't ship. The Vulkan build also requires vulkaninfo, headers, shader
      # tooling (including glslc, which CMake's FindVulkan requires), and a Mesa
      # ICD so whisper.cpp is staged into the Linux installer.
      - name: Install rpm and Vulkan build tooling (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm vulkan-tools libvulkan-dev mesa-vulkan-drivers glslang-tools glslc

      - name: Install JS deps
        run: npm ci

      - name: Compile TypeScript + renderer
        run: npm run build

      # Each sidecar is frozen from its OWN venv (scripts/package-sidecar.sh),
      # which a fresh runner doesn't have — this was the long-standing release
      # failure ("Missing venv"). Create each venv and install its pinned
      # requirements so the freeze step has the interpreter + deps it expects.
      - name: Set up sidecar venvs
        run: |
          for s in stt tts wakeword; do
            python -m venv "sidecars/$s/venv"
            # venv tool dir is bin/ on Linux/macOS, Scripts/ on Windows.
            BIN="sidecars/$s/venv/bin"; [ -d "sidecars/$s/venv/Scripts" ] && BIN="sidecars/$s/venv/Scripts"
            "$BIN/python" -m pip install --upgrade pip
            "$BIN/pip" install -r "sidecars/$s/requirements.txt"
          done

      # Freeze the three Python sidecars (STT, TTS/Kokoro, wake word) into
      # onedir bundles for THIS OS. PyInstaller runs natively per platform.
      - name: Freeze sidecars
        run: npm run package:sidecars

      # Build whisper.cpp for this OS (Vulkan where available, CPU fallback).
      # See scripts/build-whispercpp.sh; Windows uses the CMake + VS toolchain.
      - name: Build + stage whisper.cpp
        run: |
          bash scripts/build-whispercpp.sh
          bash scripts/stage-whisper.sh

      - name: Package installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.target }} --config electron-builder.yml --publish onTagOrDraft

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aria-${{ matrix.artifact }}
          path: |
            dist-installers/*.deb
            dist-installers/*.rpm
            dist-installers/*.AppImage
            dist-installers/*.exe
            dist-installers/*.dmg
            dist-installers/*.zip
          if-no-files-found: ignore

  # Each native mac job writes an architecture-specific latest-mac.yml. Merge
  # them after both complete so electron-updater sees both native downloads.
  finalize-mac-metadata:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: aria-mac-arm64
          path: mac-arm64
      - uses: actions/download-artifact@v4
        with:
          name: aria-mac-x64
          path: mac-x64
      - name: Merge and upload macOS updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/merge-mac-update-metadata.js mac-arm64 mac-x64 latest-mac.yml
          gh release upload "$GITHUB_REF_NAME" latest-mac.yml --clobber
