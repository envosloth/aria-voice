# electron-builder config for ARIA — Linux AppImage + .deb.
#
# Prerequisites before `electron-builder`:
#   1. npm run build                       (compile TS + copy renderer)
#   2. for s in stt tts wakeword; do scripts/package-sidecar.sh $s; done
#      (freezes PyInstaller onedir bundles into build/sidecars/<name>/)
#
# Model weights are NOT bundled — they download on first run (see model-manager).
appId: com.aria.voice
productName: ARIA
copyright: Copyright © 2026

# In-app auto-update source. electron-builder embeds this as app-update.yml inside
# the AppImage and emits a matching latest-linux.yml next to the artifacts, which
# electron-updater reads to find newer GitHub Releases (see src/main/updater.ts).
# `publish` here only configures the update channel — it does NOT auto-upload;
# releases are still cut with `gh release` (latest-linux.yml must be attached).
publish:
  provider: github
  owner: envosloth
  repo: aria-voice
  releaseType: release

directories:
  output: dist-installers
  buildResources: assets

# App files that go into the asar
files:
  - dist/**/*
  - package.json
  - "!**/*.map"
  # Runtime tray icon (Windows tray / macOS menu bar); buildResources `icon.png`
  # is build-time only. Lands at <asar>/assets/icon.png (see createTray).
  - assets/icon.png

# PyInstaller-frozen sidecars shipped alongside the app (unpacked, executable).
# Lands at <resources>/sidecars/<name>/<name>, which the supervisor resolves via
# process.resourcesPath.
extraResources:
  - from: build/sidecars
    to: sidecars
    filter:
      - "**/*"
  # whisper.cpp binaries + libs so STT works on a fresh PC (no local whisper.cpp).
  - from: build/whisper
    to: whisper
    filter:
      - "**/*"

linux:
  icon: assets/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb        # Debian / Ubuntu / Mint / Pop!_OS
      arch: [x64]
    # rpm dropped: it needs the `rpmbuild` system tool (not present here), and
    # its failure aborted `npm run dist` even after the .deb/.AppImage built.
    # Re-add `- target: rpm` (and `apt-get install rpm`) if a Fedora/RHEL build
    # is ever needed.
  category: Utility
  synopsis: GPU-accelerated local voice assistant
  description: >
    ARIA is a local-first voice assistant with GPU-accelerated speech-to-text
    (whisper.cpp/Vulkan), natural local text-to-speech (Kokoro-82M), and
    wake-word detection (openWakeWord), routing to a user-configured LLM or
    agent harness. Screen sharing lets the agent see your desktop.
  desktop:
    Name: ARIA
    Comment: Voice assistant
    Categories: Utility;

# Fedora/openSUSE runtime deps (rpm package names differ from deb).
rpm:
  depends:
    - libsecret
    - gnome-keyring
    - libnotify
    - vulkan-loader

# macOS: unsigned dmg + zip (open-source; users self-sign or right-click-open).
# whisper.cpp on macOS uses the Metal backend (staged into build/whisper by CI).
mac:
  icon: assets/icon.png
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  hardenedRuntime: false
  gatekeeperAssess: false

# Windows: NSIS installer + portable. whisper.cpp uses the Vulkan/CPU backend.
win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# .deb runtime dependencies. gnome-keyring/libsecret is REQUIRED for safeStorage
# to encrypt API keys (else it silently falls back to plaintext obfuscation).
deb:
  maintainer: ARIA Project <aria@localhost>
  afterInstall: assets/deb-after-install.sh
  depends:
    - libsecret-1-0
    - gnome-keyring
    - libnotify4
    - libnss3
    - libasound2
    - libvulkan1      # whisper.cpp Vulkan backend (GPU STT)
    - libgomp1        # OpenMP runtime for whisper.cpp
  recommends:
    - libfuse2                # AppImage runtime on older targets
    - mesa-vulkan-drivers     # Vulkan driver (RADV) for AMD/Intel GPUs

appImage:
  # AppImage needs libfuse2 on some targets; documented in README.
  artifactName: ${productName}-${version}-${arch}.AppImage

# Chromium sandbox must be set up properly (root:root, mode 4755). electron-builder
# handles this for the packaged app; never ship --no-sandbox.
